{% extends "base.html" %}
{% block content %}
  <article class="page">
    <h1>{{ title }}</h1>
    {% if updated_display %}
    <p class="page-meta">updated {{ updated_display }}</p>
    {% if updated_fun %}<p class="page-meta-fun">{{ updated_fun }}</p>{% endif %}
    {% endif %}
    <div class="page-body">
      {{ content_html | safe }}
    </div>
  </article>
{% endblock %}
