name: Build & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GLASS_RSS_URL: "https://glass.photo/yumyumbeanfish/rss"
  DISCOGS_USERNAME: "tolujukebox"
  SITE_BASEURL: "/yumyumbeanfish"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch photos from Glass
        run: python scripts/fetch_photos.py

      - name: Fetch records from Discogs
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
        run: python scripts/fetch_records.py

      - name: Build site
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: python build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
